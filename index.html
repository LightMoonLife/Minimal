<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      max-width: 540px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 2rem;
    }

    a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    a:hover {
      border-color: #111;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.875rem;
      color: #999;
    }
  </style>
</head>
<body>
  <main>
    <h1>Minimal</h1>
    <p>A clean, simple starting point. Nothing more than what you need.</p>
    <a href="https://github.com/LightMoonLife/Minimal">View on GitHub</a>
  </main>
  <footer>&copy; 2026 Minimal</footer>
</body>
</html>
